<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#121225"/>
  <text x="400" y="40" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="sans-serif">Token 计费拆解</text>
  <!-- 三段式 -->
  <!-- 输入 -->
  <rect x="60" y="80" width="200" height="140" rx="12" fill="#1a1a3e" stroke="#4a90d9" stroke-width="2"/>
  <text x="160" y="115" fill="#4a90d9" text-anchor="middle" font-size="16" font-weight="bold" font-family="sans-serif">输入 Token</text>
  <text x="160" y="150" fill="#aaa" text-anchor="middle" font-size="13" font-family="sans-serif">Prompt / 上下文</text>
  <text x="160" y="190" fill="#4a90d9" text-anchor="middle" font-size="24" font-weight="bold" font-family="sans-serif">$2.00</text>
  <text x="160" y="210" fill="#666" text-anchor="middle" font-size="11" font-family="sans-serif">/1M tokens</text>
  <!-- 输出 -->
  <rect x="300" y="80" width="200" height="140" rx="12" fill="#1a1a3e" stroke="#ff6b6b" stroke-width="2"/>
  <text x="400" y="115" fill="#ff6b6b" text-anchor="middle" font-size="16" font-weight="bold" font-family="sans-serif">输出 Token</text>
  <text x="400" y="150" fill="#aaa" text-anchor="middle" font-size="13" font-family="sans-serif">AI 回复 / 生成</text>
  <text x="400" y="190" fill="#ff6b6b" text-anchor="middle" font-size="24" font-weight="bold" font-family="sans-serif">$12.00</text>
  <text x="400" y="210" fill="#666" text-anchor="middle" font-size="11" font-family="sans-serif">/1M tokens</text>
  <!-- 缓存 -->
  <rect x="540" y="80" width="200" height="140" rx="12" fill="#1a1a3e" stroke="#00d4aa" stroke-width="2"/>
  <text x="640" y="115" fill="#00d4aa" text-anchor="middle" font-size="16" font-weight="bold" font-family="sans-serif">缓存输入</text>
  <text x="640" y="150" fill="#aaa" text-anchor="middle" font-size="13" font-family="sans-serif">上下文命中缓存</text>
  <text x="640" y="190" fill="#00d4aa" text-anchor="middle" font-size="24" font-weight="bold" font-family="sans-serif">$0.20</text>
  <text x="640" y="210" fill="#666" text-anchor="middle" font-size="11" font-family="sans-serif">/1M tokens</text>
  <!-- 对比箭头 -->
  <text x="400" y="280" fill="#888" text-anchor="middle" font-size="13" font-family="sans-serif">输出价格是输入的 6 倍 · 缓存价格是正常输入的 10%</text>
  <!-- 示例 -->
  <rect x="100" y="310" width="600" height="60" rx="8" fill="#0f0f25" stroke="#333" stroke-width="1"/>
  <text x="400" y="340" fill="#ccc" text-anchor="middle" font-size="12" font-family="sans-serif">示例：5000 Token 输入 + 300 Token 输出 ≈ $0.0036（Qwen 3.6 Plus）</text>
  <!-- x 标记 -->
  <line x1="280" y1="150" x2="290" y2="150" stroke="#555" stroke-width="2"/>
  <line x1="520" y1="150" x2="530" y2="150" stroke="#555" stroke-width="2"/>
</svg>

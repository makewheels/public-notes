<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="383" fill="url(#bg1)"/>
  <!-- Token 符号装饰 -->
  <text x="100" y="100" fill="#4a90d9" font-size="80" font-family="monospace" opacity="0.08">$$token$$token$$token$$</text>
  <text x="100" y="200" fill="#ff6b6b" font-size="80" font-family="monospace" opacity="0.08">token$$token$$token$$tok</text>
  <text x="100" y="300" fill="#00d4aa" font-size="80" font-family="monospace" opacity="0.08">token$$token$$token$$tok</text>
  <!-- 标题 -->
  <text x="450" y="140" fill="#e0e0e0" font-size="36" font-weight="bold" text-anchor="middle" font-family="sans-serif">AI 是怎么算钱的？</text>
  <text x="450" y="200" fill="#4a90d9" font-size="24" text-anchor="middle" font-family="sans-serif">一篇文章看懂 Token 和计费</text>
  <!-- 价格标签 -->
  <rect x="250" y="250" width="120" height="40" rx="8" fill="#1a1a3e" stroke="#4a90d9" stroke-width="1"/>
  <text x="310" y="275" fill="#4a90d9" text-anchor="middle" font-size="14" font-family="monospace">$2/input</text>
  <rect x="390" y="250" width="120" height="40" rx="8" fill="#1a1a3e" stroke="#ff6b6b" stroke-width="1"/>
  <text x="450" y="275" fill="#ff6b6b" text-anchor="middle" font-size="14" font-family="monospace">$12/output</text>
  <rect x="530" y="250" width="120" height="40" rx="8" fill="#1a1a3e" stroke="#00d4aa" stroke-width="1"/>
  <text x="590" y="275" fill="#00d4aa" text-anchor="middle" font-size="14" font-family="monospace">$0.2/cache</text>
  <!-- 底部 -->
  <text x="450" y="350" fill="#555" font-size="14" text-anchor="middle" font-family="sans-serif">2026.4.5 · AIGC Insight</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <!-- 下降箭头装饰 -->
  <path d="M400 80 L450 160 L500 80" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.4"/>
  <path d="M380 120 L450 220 L520 120" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.25"/>
  <!-- 价格数字 -->
  <text x="200" y="130" fill="#ff6b6b" font-size="42" font-weight="bold" text-anchor="middle" font-family="sans-serif" opacity="0.3">$15</text>
  <text x="700" y="130" fill="#00d4aa" font-size="42" font-weight="bold" text-anchor="middle" font-family="sans-serif" opacity="0.3">$1</text>
  <line x1="280" y1="115" x2="620" y2="115" stroke="#666" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <!-- 主标题 -->
  <text x="450" y="200" fill="#ffffff" font-size="46" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">DeepSeek R2</text>
  <text x="450" y="260" fill="#ff6b6b" font-size="40" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">把价格打下来了，然后呢</text>
  <!-- 品牌 -->
  <text x="450" y="345" fill="#555" font-size="16" text-anchor="middle" font-family="sans-serif">AIGC Insight</text>
</svg>

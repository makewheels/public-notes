<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#121220"/>
  <text x="400" y="38" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="PingFang SC, sans-serif">80/20 模型分配策略</text>
  <!-- 大饼图概念 -->
  <!-- 80% 区域 -->
  <path d="M300 220 L300 120 A100 100 0 1 1 217 292 Z" fill="#00d4aa" opacity="0.3" stroke="#00d4aa" stroke-width="1"/>
  <text x="260" y="240" fill="#00d4aa" font-size="22" font-weight="bold" text-anchor="middle" font-family="sans-serif">80%</text>
  <text x="260" y="262" fill="#00d4aa" font-size="12" text-anchor="middle" font-family="PingFang SC, sans-serif">低价模型</text>
  <!-- 20% 区域 -->
  <path d="M300 220 L217 292 A100 100 0 0 1 300 120 Z" fill="#4a90d9" opacity="0.3" stroke="#4a90d9" stroke-width="1"/>
  <text x="340" y="165" fill="#4a90d9" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif">20%</text>
  <text x="340" y="183" fill="#4a90d9" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">顶级模型</text>
  <!-- 右侧说明 -->
  <rect x="440" y="90" width="320" height="70" rx="8" fill="#1a2a2a" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <text x="460" y="115" fill="#00d4aa" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">80% 调用 → 低价模型</text>
  <text x="460" y="140" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">批量处理 · 分类 · 摘要 · 翻译</text>
  <rect x="440" y="180" width="320" height="70" rx="8" fill="#1a1a3a" stroke="#4a90d9" stroke-width="1" opacity="0.6"/>
  <text x="460" y="205" fill="#4a90d9" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">20% 调用 → 顶级模型</text>
  <text x="460" y="230" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">架构决策 · 关键代码 · 复杂推理</text>
  <!-- 效果 -->
  <rect x="440" y="280" width="320" height="55" rx="8" fill="#1a1a1a" stroke="#ffd93d" stroke-width="1" opacity="0.6"/>
  <text x="460" y="303" fill="#ffd93d" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">效果</text>
  <text x="460" y="323" fill="#aaa" font-size="12" font-family="PingFang SC, sans-serif">成本降低 60%，质量下降 &lt;5%</text>
  <!-- 底部 -->
  <text x="400" y="380" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">不是所有人都换最便宜的，而是按场景分配预算</text>
</svg>

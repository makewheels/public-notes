<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a0f0f"/>
    </linearGradient>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <!-- 警告装饰 -->
  <circle cx="450" cy="100" r="35" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
  <text x="450" y="112" fill="#ff6b6b" font-size="32" text-anchor="middle" font-family="sans-serif" opacity="0.5">!</text>
  <!-- 时间线装饰 -->
  <line x1="150" y1="310" x2="750" y2="310" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="310" r="4" fill="#666"/>
  <circle cx="350" cy="310" r="4" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="550" cy="310" r="4" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="750" cy="310" r="5" fill="#ff6b6b"/>
  <text x="150" y="335" fill="#555" font-size="12" text-anchor="middle" font-family="sans-serif">0h</text>
  <text x="750" y="335" fill="#ff6b6b" font-size="12" text-anchor="middle" font-family="sans-serif">4h 入侵成功</text>
  <!-- 主标题 -->
  <text x="450" y="190" fill="#ffffff" font-size="44" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">AI Agent 4小时攻破FreeBSD</text>
  <text x="450" y="250" fill="#aaa" font-size="30" text-anchor="middle" font-family="PingFang SC, sans-serif">你的代码安全吗</text>
  <!-- 品牌 -->
  <text x="450" y="365" fill="#555" font-size="16" text-anchor="middle" font-family="sans-serif">AIGC Insight</text>
</svg>

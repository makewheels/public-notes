<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f0f1a"/>
  <text x="400" y="36" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="PingFang SC, sans-serif">5 项工程防御措施</text>
  <!-- 五行 -->
  <rect x="60" y="55" width="680" height="52" rx="8" fill="#1a1a2a" stroke="#4a90d9" stroke-width="1" opacity="0.6"/>
  <circle cx="95" cy="81" r="15" fill="#4a90d9" opacity="0.3"/>
  <text x="95" y="86" fill="#4a90d9" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">1</text>
  <text x="125" y="76" fill="#ddd" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">AI Code Review</text>
  <text x="125" y="96" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">代码合并前 → AI 安全审查 → 嵌入 CI/CD</text>

  <rect x="60" y="117" width="680" height="52" rx="8" fill="#1a1a2a" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <circle cx="95" cy="143" r="15" fill="#00d4aa" opacity="0.3"/>
  <text x="95" y="148" fill="#00d4aa" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">2</text>
  <text x="125" y="138" fill="#ddd" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">自动化渗透测试</text>
  <text x="125" y="158" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">自己先攻击自己 → 成本从 $万 降到 $几</text>

  <rect x="60" y="179" width="680" height="52" rx="8" fill="#1a1a2a" stroke="#ffd93d" stroke-width="1" opacity="0.6"/>
  <circle cx="95" cy="205" r="15" fill="#ffd93d" opacity="0.3"/>
  <text x="95" y="210" fill="#ffd93d" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">3</text>
  <text x="125" y="200" fill="#ddd" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">Runtime 异常检测</text>
  <text x="125" y="220" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">AI 分析运行时行为 → 发现未知攻击模式</text>

  <rect x="60" y="241" width="680" height="52" rx="8" fill="#1a1a2a" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <circle cx="95" cy="267" r="15" fill="#ff6b6b" opacity="0.3"/>
  <text x="95" y="272" fill="#ff6b6b" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">4</text>
  <text x="125" y="262" fill="#ddd" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">最小权限原则</text>
  <text x="125" y="282" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">每个服务只给最小权限 → 限制攻击扩散</text>

  <rect x="60" y="303" width="680" height="52" rx="8" fill="#1a1a2a" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
  <circle cx="95" cy="329" r="15" fill="#c084fc" opacity="0.3"/>
  <text x="95" y="334" fill="#c084fc" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">5</text>
  <text x="125" y="324" fill="#ddd" font-size="14" font-weight="bold" font-family="PingFang SC, sans-serif">供应链安全</text>
  <text x="125" y="344" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">AI 扫描依赖树 → 检查每个包来源和漏洞</text>

  <!-- 底部 -->
  <text x="400" y="385" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">核心思路：用 AI 防御 AI</text>
</svg>

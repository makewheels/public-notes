<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f0f1a"/>
  <text x="400" y="38" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="PingFang SC, sans-serif">AI Agent 攻击路径：从零到入侵 4 小时</text>
  <!-- 时间轴 -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#333" stroke-width="2"/>
  <!-- 步骤 1 -->
  <circle cx="160" cy="200" r="24" fill="#1a1a3a" stroke="#4a90d9" stroke-width="2"/>
  <text x="160" y="206" fill="#4a90d9" font-size="16" font-weight="bold" text-anchor="middle" font-family="sans-serif">1</text>
  <text x="160" y="165" fill="#4a90d9" font-size="14" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">代码审计</text>
  <text x="160" y="250" fill="#888" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">扫描几十万行</text>
  <text x="160" y="268" fill="#888" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">识别漏洞点</text>
  <text x="160" y="290" fill="#555" font-size="10" text-anchor="middle" font-family="sans-serif">~30 min</text>
  <!-- 箭头 1→2 -->
  <line x1="190" y1="200" x2="340" y2="200" stroke="#555" stroke-width="1"/>
  <polygon points="335,195 345,200 335,205" fill="#555"/>
  <!-- 步骤 2 -->
  <circle cx="400" cy="200" r="24" fill="#1a1a3a" stroke="#ffd93d" stroke-width="2"/>
  <text x="400" y="206" fill="#ffd93d" font-size="16" font-weight="bold" text-anchor="middle" font-family="sans-serif">2</text>
  <text x="400" y="165" fill="#ffd93d" font-size="14" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">攻击路径构造</text>
  <text x="400" y="250" fill="#888" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">多步推理</text>
  <text x="400" y="268" fill="#888" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">利用链规划</text>
  <text x="400" y="290" fill="#555" font-size="10" text-anchor="middle" font-family="sans-serif">~2 hr</text>
  <!-- 箭头 2→3 -->
  <line x1="430" y1="200" x2="580" y2="200" stroke="#555" stroke-width="1"/>
  <polygon points="575,195 585,200 575,205" fill="#555"/>
  <!-- 步骤 3 -->
  <circle cx="640" cy="200" r="24" fill="#1a1a3a" stroke="#ff6b6b" stroke-width="2"/>
  <text x="640" y="206" fill="#ff6b6b" font-size="16" font-weight="bold" text-anchor="middle" font-family="sans-serif">3</text>
  <text x="640" y="165" fill="#ff6b6b" font-size="14" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">自动化验证</text>
  <text x="640" y="250" fill="#888" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">搭建环境</text>
  <text x="640" y="268" fill="#888" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">试错-重试循环</text>
  <text x="640" y="290" fill="#555" font-size="10" text-anchor="middle" font-family="sans-serif">~1.5 hr</text>
  <!-- 入侵成功标记 -->
  <rect x="590" y="320" width="100" height="28" rx="6" fill="#ff6b6b" opacity="0.2"/>
  <text x="640" y="339" fill="#ff6b6b" font-size="13" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">入侵成功</text>
  <!-- 对比：人类 -->
  <rect x="80" y="70" width="260" height="55" rx="8" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="100" y="93" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">👤 人类渗透测试：</text>
  <text x="100" y="113" fill="#555" font-size="12" font-family="PingFang SC, sans-serif">几天到几周 · 成本 $$$$$</text>
  <rect x="460" y="70" width="260" height="55" rx="8" fill="#1a0f1a" stroke="#ff6b6b" stroke-width="1" opacity="0.8"/>
  <text x="480" y="93" fill="#ff6b6b" font-size="12" font-family="PingFang SC, sans-serif">🤖 AI Agent：</text>
  <text x="480" y="113" fill="#ff6b6b" font-size="12" font-family="PingFang SC, sans-serif" opacity="0.8">4 小时 · 成本 几美元</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f0f23"/>
  <!-- 协作 vs 自动化 对比 -->
  <!-- 左侧: 自动化 -->
  <rect x="80" y="100" width="280" height="220" rx="12" fill="#1a1a2e" stroke="#666" stroke-width="3"/>
  <text x="220" y="145" fill="#aaa" font-size="18" text-anchor="middle" font-family="sans-serif">自动化模式</text>
  <!-- 用户 -->
  <circle cx="150" cy="190" r="15" fill="#4a90d9"/>
  <text x="150" y="195" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">人</text>
  <!-- 单向箭头 -->
  <rect x="185" y="185" width="80" height="12" fill="#4a90d9" rx="6"/>
  <polygon points="270,190 290,185 290,195" fill="#4a90d9"/>
  <!-- AI -->
  <circle cx="310" cy="190" r="15" fill="#ff6b6b"/>
  <text x="310" y="195" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">AI</text>
  <!-- 标注 -->
  <text x="220" y="280" fill="#888" font-size="13" text-anchor="middle" font-family="sans-serif">新手倾向 · 成功率低</text>
  <text x="220" y="300" fill="#888" font-size="13" text-anchor="middle" font-family="sans-serif">一次性指令，无反馈</text>
  <!-- 右侧: 协作 -->
  <rect x="460" y="100" width="280" height="220" rx="12" fill="#1a1a2e" stroke="#00d4aa" stroke-width="3"/>
  <text x="600" y="145" fill="#00d4aa" font-size="18" text-anchor="middle" font-family="sans-serif">协作模式</text>
  <!-- 双向交互 -->
  <circle cx="530" cy="190" r="15" fill="#4a90d9"/>
  <text x="530" y="195" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">人</text>
  <!-- 双向箭头 -->
  <path d="M558,185 Q600,170 646,185" fill="none" stroke="#00d4aa" stroke-width="3"/>
  <path d="M646,195 Q600,210 558,195" fill="none" stroke="#ff6b6b" stroke-width="3"/>
  <circle cx="655" cy="190" r="15" fill="#ff6b6b"/>
  <text x="655" y="195" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">AI</text>
  <!-- 多轮标注 -->
  <text x="600" y="240" fill="#00d4aa" font-size="12" text-anchor="middle" font-family="sans-serif">迭代 · 验证 · 学习</text>
  <text x="600" y="280" fill="#888" font-size="13" text-anchor="middle" font-family="sans-serif">老手倾向 · 成功率高10%</text>
  <text x="600" y="300" fill="#888" font-size="13" text-anchor="middle" font-family="sans-serif">反复沟通，持续打磨</text>
</svg>

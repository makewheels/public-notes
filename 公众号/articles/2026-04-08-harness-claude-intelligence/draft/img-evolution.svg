<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  <!-- 标题 -->
  <text x="400" y="35" fill="#888" text-anchor="middle" font-size="16" font-family="PingFang SC, sans-serif">Agent 框架的演进方向</text>
  <!-- 时间轴 -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="80" r="6" fill="#ff6b6b"/>
  <circle cx="400" cy="80" r="6" fill="#ffaa44"/>
  <circle cx="650" cy="80" r="6" fill="#00d4aa"/>
  <text x="150" y="65" fill="#ff6b6b" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">早期</text>
  <text x="400" y="65" fill="#ffaa44" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">现在</text>
  <text x="650" y="65" fill="#00d4aa" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">未来</text>
  <!-- 早期 -->
  <rect x="60" y="110" width="180" height="240" rx="8" fill="#1a1520" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
  <text x="150" y="140" fill="#ff6b6b" text-anchor="middle" font-size="16" font-weight="bold" font-family="PingFang SC, sans-serif">框架做一切</text>
  <text x="150" y="170" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">框架编排工具调用</text>
  <text x="150" y="195" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">框架管理上下文</text>
  <text x="150" y="220" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">框架管理记忆</text>
  <text x="150" y="245" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">框架控制流程</text>
  <text x="150" y="280" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">模型能力弱</text>
  <text x="150" y="300" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">→ 框架代码膨胀</text>
  <!-- 现在 -->
  <rect x="310" y="110" width="180" height="240" rx="8" fill="#1a1a15" stroke="#ffaa44" stroke-width="1" opacity="0.4"/>
  <text x="400" y="140" fill="#ffaa44" text-anchor="middle" font-size="16" font-weight="bold" font-family="PingFang SC, sans-serif">逐步移交</text>
  <text x="400" y="170" fill="#ffaa44" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif" opacity="0.8">模型自己编排</text>
  <text x="400" y="195" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">Skills 渐进披露</text>
  <text x="400" y="220" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">Compaction 自主压缩</text>
  <text x="400" y="245" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">框架只管边界</text>
  <text x="400" y="280" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">模型能力增强</text>
  <text x="400" y="300" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">→ 框架代码瘦身</text>
  <!-- 未来 -->
  <rect x="560" y="110" width="180" height="240" rx="8" fill="#0a1a15" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
  <text x="650" y="140" fill="#00d4aa" text-anchor="middle" font-size="16" font-weight="bold" font-family="PingFang SC, sans-serif">模型自治</text>
  <text x="650" y="170" fill="#00d4aa" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif" opacity="0.8">模型完全自主</text>
  <text x="650" y="195" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">自建上下文</text>
  <text x="650" y="220" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">自管记忆</text>
  <text x="650" y="245" fill="#888" text-anchor="middle" font-size="13" font-family="PingFang SC, sans-serif">框架 = 安全网</text>
  <text x="650" y="280" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">模型能力极强</text>
  <text x="650" y="300" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">→ 框架代码极简</text>
  <!-- 箭头方向 -->
  <text x="400" y="385" fill="#666" text-anchor="middle" font-size="14" font-family="PingFang SC, sans-serif">模型越强 → 框架越薄 → 控制权越少 → 效果越好</text>
</svg>

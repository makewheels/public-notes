<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0a0a1a"/>
  <text x="400" y="36" fill="#e0e0e0" text-anchor="middle" font-size="16" font-weight="bold" font-family="sans-serif">Harness 架构：循环 + 基础设施</text>
  <!-- 中心循环 -->
  <circle cx="400" cy="220" r="60" fill="none" stroke="#00d4aa" stroke-width="3"/>
  <text x="400" y="210" fill="#00d4aa" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif">AI 循环</text>
  <text x="400" y="235" fill="#00d4aa" text-anchor="middle" font-size="11" font-family="sans-serif">while True</text>
  <!-- 外围模块 -->
  <rect x="60" y="110" width="100" height="40" rx="6" fill="#1a1a3e" stroke="#4a90d9" stroke-width="1"/>
  <text x="110" y="128" fill="#4a90d9" text-anchor="middle" font-size="12" font-family="sans-serif">工具库</text>
  <text x="110" y="143" fill="#666" text-anchor="middle" font-size="9" font-family="sans-serif">43 Tools</text>
  <line x1="160" y1="130" x2="340" y2="200" stroke="#4a90d9" stroke-width="1" opacity="0.5"/>
  <!-- 技能 -->
  <rect x="640" y="110" width="100" height="40" rx="6" fill="#1a1a3e" stroke="#ffd93d" stroke-width="1"/>
  <text x="690" y="128" fill="#ffd93d" text-anchor="middle" font-size="12" font-family="sans-serif">技能系统</text>
  <text x="690" y="143" fill="#666" text-anchor="middle" font-size="9" font-family="sans-serif">On-Demand</text>
  <line x1="640" y1="130" x2="460" y2="200" stroke="#ffd93d" stroke-width="1" opacity="0.5"/>
  <!-- 记忆 -->
  <rect x="60" y="310" width="100" height="40" rx="6" fill="#1a1a3e" stroke="#ff6b6b" stroke-width="1"/>
  <text x="110" y="328" fill="#ff6b6b" text-anchor="middle" font-size="12" font-family="sans-serif">持久记忆</text>
  <text x="110" y="343" fill="#666" text-anchor="middle" font-size="9" font-family="sans-serif">Cross-Session</text>
  <line x1="160" y1="330" x2="340" y2="240" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <!-- 权限 -->
  <rect x="640" y="310" width="100" height="40" rx="6" fill="#1a1a3e" stroke="#50fa7b" stroke-width="1"/>
  <text x="690" y="328" fill="#50fa7b" text-anchor="middle" font-size="12" font-family="sans-serif">权限系统</text>
  <text x="690" y="343" fill="#666" text-anchor="middle" font-size="9" font-family="sans-serif">Safety</text>
  <line x1="640" y1="330" x2="460" y2="240" stroke="#50fa7b" stroke-width="1" opacity="0.5"/>
  <!-- 目标 -->
  <rect x="340" y="60" width="120" height="35" rx="6" fill="#2a1a2e" stroke="#ff6b6b" stroke-width="1"/>
  <text x="400" y="80" fill="#ff6b6b" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif">目标定义</text>
  <line x1="400" y1="95" x2="400" y2="160" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <!-- Hook -->
  <rect x="340" y="370" width="120" height="35" rx="6" fill="#1a3030" stroke="#bd93f9" stroke-width="1"/>
  <text x="400" y="390" fill="#bd93f9" text-anchor="middle" font-size="12" font-family="sans-serif">Hook 系统</text>
  <line x1="400" y1="370" x2="400" y2="280" stroke="#bd93f9" stroke-width="1" opacity="0.5"/>
</svg>

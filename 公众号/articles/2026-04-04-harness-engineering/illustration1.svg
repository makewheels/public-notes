<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- 左侧：发动机（模型） -->
  <g transform="translate(150, 200)">
    <!-- 发动机外框 -->
    <rect x="-60" y="-80" width="120" height="160" fill="#2d3a4f" rx="10" stroke="#e94560" stroke-width="3"/>
    <!-- 气缸 -->
    <circle cx="0" cy="-30" r="25" fill="#3d4a5f" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="0" cy="30" r="25" fill="#3d4a5f" stroke="#ff6b6b" stroke-width="2"/>
    <!-- 活塞 -->
    <rect x="-15" y="-45" width="30" height="15" fill="#ff6b6b"/>
    <rect x="-15" y="15" width="30" height="15" fill="#ff6b6b"/>
    <!-- 连接轴 -->
    <rect x="-5" y="-10" width="10" height="55" fill="#ffa502"/>
  </g>
  
  <!-- 左侧标签 -->
  <text x="150" y="310" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">模型 = 发动机</text>
  <text x="150" y="340" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">决定能不能跑</text>
  
  <!-- 中间分隔线 -->
  <rect x="380" y="100" width="4" height="200" fill="#e94560" rx="2"/>
  
  <!-- 右侧：刹车+方向盘+仪表盘（Harness） -->
  <g transform="translate(550, 100)">
    <!-- 方向盘 -->
    <circle cx="0" cy="50" r="40" fill="none" stroke="#4ecdc4" stroke-width="6"/>
    <circle cx="0" cy="50" r="15" fill="#4ecdc4"/>
    <line x1="-40" y1="50" x2="-25" y2="50" stroke="#4ecdc4" stroke-width="6"/>
    <line x1="40" y1="50" x2="25" y2="50" stroke="#4ecdc4" stroke-width="6"/>
    <line x1="0" y1="10" x2="0" y2="35" stroke="#4ecdc4" stroke-width="6"/>
    
    <!-- 仪表盘 -->
    <rect x="-50" y="100" width="100" height="50" fill="#2d3a4f" rx="5" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="-25" cy="125" r="12" fill="none" stroke="#4ecdc4" stroke-width="1.5"/>
    <circle cx="25" cy="125" r="12" fill="none" stroke="#4ecdc4" stroke-width="1.5"/>
    <line x1="-25" y1="125" x2="-25" y2="115" stroke="#e94560" stroke-width="2"/>
    <line x1="25" y1="125" x2="30" y2="120" stroke="#4ecdc4" stroke-width="2"/>
  </g>
  
  <!-- 右侧标签 -->
  <text x="550" y="310" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Harness = 驾驭系统</text>
  <text x="550" y="340" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">决定能不能稳、跑得远</text>
  
  <!-- 标题 -->
  <text x="400" y="50" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">模型 vs Harness：分工不同</text>
</svg>
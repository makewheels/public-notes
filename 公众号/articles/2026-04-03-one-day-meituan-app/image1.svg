<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="PingFang SC" font-size="24" font-weight="bold" fill="#fff">
    美团的五大护城河
  </text>

  <!-- 中心圆 -->
  <circle cx="400" cy="260" r="80" fill="#ffd700" opacity="0.9"/>
  <text x="400" y="255" text-anchor="middle" font-family="PingFang SC" font-size="20" font-weight="bold" fill="#1a1a2e">美团</text>
  <text x="400" y="280" text-anchor="middle" font-family="PingFang SC" font-size="14" fill="#1a1a2e">核心价值</text>

  <!-- 五个护城河 -->
  <!-- 1. 网络效应 -->
  <circle cx="200" cy="140" r="50" fill="#4ecdc4" opacity="0.8"/>
  <text x="200" y="135" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">网络效应</text>
  <text x="200" y="155" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#fff">6亿用户+1000万商家</text>
  <line x1="250" y1="140" x2="320" y2="200" stroke="#4ecdc4" stroke-width="2"/>

  <!-- 2. 线下履约 -->
  <circle cx="600" cy="140" r="50" fill="#ff6b6b" opacity="0.8"/>
  <text x="600" y="135" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">线下履约</text>
  <text x="600" y="155" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#fff">600万骑手+地推</text>
  <line x1="550" y1="140" x2="480" y2="200" stroke="#ff6b6b" stroke-width="2"/>

  <!-- 3. 数据算法 -->
  <circle cx="200" cy="380" r="50" fill="#a855f7" opacity="0.8"/>
  <text x="200" y="375" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">数据算法</text>
  <text x="200" y="395" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#fff">10年数据积累</text>
  <line x1="250" y1="380" x2="320" y2="320" stroke="#a855f7" stroke-width="2"/>

  <!-- 4. 合规信任 -->
  <circle cx="600" cy="380" r="50" fill="#3b82f6" opacity="0.8"/>
  <text x="600" y="375" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">合规信任</text>
  <text x="600" y="395" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#fff">牌照+资质</text>
  <line x1="550" y1="380" x2="480" y2="320" stroke="#3b82f6" stroke-width="2"/>

  <!-- 5. 用户心智 -->
  <circle cx="400" cy="450" r="45" fill="#f59e0b" opacity="0.8"/>
  <text x="400" y="445" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">用户心智</text>
  <text x="400" y="465" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#fff">外卖=美团</text>
  <line x1="400" y1="405" x2="400" y2="340" stroke="#f59e0b" stroke-width="2"/>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="PingFang SC" font-size="12" fill="#666">
    这些护城河，AI 一行代码都生成不了
  </text>
</svg>
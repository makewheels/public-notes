<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#121225"/>
  <text x="400" y="38" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="PingFang SC, sans-serif">低效 vs 高效：同一个工具，不同的结果</text>
  <!-- 左侧：低效 -->
  <rect x="40" y="60" width="340" height="310" rx="10" fill="#1a1020" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <text x="210" y="95" fill="#ff6b6b" text-anchor="middle" font-size="16" font-weight="bold" font-family="PingFang SC, sans-serif">低效使用者</text>
  <text x="70" y="130" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">• 一句话丢大需求</text>
  <text x="70" y="160" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">• 一个对话聊到底</text>
  <text x="70" y="190" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">• 只用一个模型</text>
  <text x="70" y="220" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">• 期望一次完美</text>
  <text x="70" y="250" fill="#888" font-size="12" font-family="PingFang SC, sans-serif">• 输出直接用</text>
  <rect x="100" y="280" width="220" height="35" rx="6" fill="#2a1020"/>
  <text x="210" y="302" fill="#ff6b6b" text-anchor="middle" font-size="14" font-family="PingFang SC, sans-serif">结论："AI 不靠谱"</text>
  <text x="210" y="350" fill="#ff6b6b" text-anchor="middle" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.4">✕</text>
  <!-- 右侧：高效 -->
  <rect x="420" y="60" width="340" height="310" rx="10" fill="#101a20" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <text x="590" y="95" fill="#00d4aa" text-anchor="middle" font-size="16" font-weight="bold" font-family="PingFang SC, sans-serif">高效使用者</text>
  <text x="450" y="130" fill="#ccc" font-size="12" font-family="PingFang SC, sans-serif">• 任务拆成小步骤</text>
  <text x="450" y="160" fill="#ccc" font-size="12" font-family="PingFang SC, sans-serif">• 主动管理上下文</text>
  <text x="450" y="190" fill="#ccc" font-size="12" font-family="PingFang SC, sans-serif">• 按场景选模型</text>
  <text x="450" y="220" fill="#ccc" font-size="12" font-family="PingFang SC, sans-serif">• 迭代式逼近结果</text>
  <text x="450" y="250" fill="#ccc" font-size="12" font-family="PingFang SC, sans-serif">• 验证后再采用</text>
  <rect x="480" y="280" width="220" height="35" rx="6" fill="#102020"/>
  <text x="590" y="302" fill="#00d4aa" text-anchor="middle" font-size="14" font-family="PingFang SC, sans-serif">结论："离不开 AI"</text>
  <text x="590" y="350" fill="#00d4aa" text-anchor="middle" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.4">✓</text>
  <!-- 中间分隔 -->
  <line x1="400" y1="80" x2="400" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- 底部数据 -->
  <text x="400" y="390" fill="#666" text-anchor="middle" font-size="11" font-family="PingFang SC, sans-serif">Anthropic 报告：使用 6 个月后，任务完成率 +10%（差异来自使用方式）</text>
</svg>

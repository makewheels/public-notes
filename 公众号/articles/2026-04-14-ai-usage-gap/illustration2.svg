<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#121225"/>
  <text x="400" y="38" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="PingFang SC, sans-serif">5 个关键差异：从今天开始改变</text>
  <!-- 五行差异 -->
  <rect x="50" y="55" width="700" height="48" rx="8" fill="#1a1a2a" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <circle cx="85" cy="79" r="14" fill="#00d4aa" opacity="0.3"/>
  <text x="85" y="84" fill="#00d4aa" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">1</text>
  <text x="115" y="74" fill="#ddd" font-size="13" font-weight="bold" font-family="PingFang SC, sans-serif">任务拆解</text>
  <text x="115" y="92" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">拆成 3 步以上 → 每步范围小、AI 理解准、审查成本低</text>

  <rect x="50" y="113" width="700" height="48" rx="8" fill="#1a1a2a" stroke="#4a90d9" stroke-width="1" opacity="0.6"/>
  <circle cx="85" cy="137" r="14" fill="#4a90d9" opacity="0.3"/>
  <text x="85" y="142" fill="#4a90d9" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">2</text>
  <text x="115" y="132" fill="#ddd" font-size="13" font-weight="bold" font-family="PingFang SC, sans-serif">上下文管理</text>
  <text x="115" y="150" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">不同任务开新对话 → 关键约定每次重申 → 管理 AI 的注意力</text>

  <rect x="50" y="171" width="700" height="48" rx="8" fill="#1a1a2a" stroke="#ffd93d" stroke-width="1" opacity="0.6"/>
  <circle cx="85" cy="195" r="14" fill="#ffd93d" opacity="0.3"/>
  <text x="85" y="200" fill="#ffd93d" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">3</text>
  <text x="115" y="190" fill="#ddd" font-size="13" font-weight="bold" font-family="PingFang SC, sans-serif">模型选择</text>
  <text x="115" y="208" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">按任务选模型 → 轻量任务用便宜模型、关键决策用顶级模型</text>

  <rect x="50" y="229" width="700" height="48" rx="8" fill="#1a1a2a" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <circle cx="85" cy="253" r="14" fill="#ff6b6b" opacity="0.3"/>
  <text x="85" y="258" fill="#ff6b6b" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">4</text>
  <text x="115" y="248" fill="#ddd" font-size="13" font-weight="bold" font-family="PingFang SC, sans-serif">迭代方式</text>
  <text x="115" y="266" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">4 轮对话拿好结果 > 1 轮对话 + 2 小时自己修</text>

  <rect x="50" y="287" width="700" height="48" rx="8" fill="#1a1a2a" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
  <circle cx="85" cy="311" r="14" fill="#c084fc" opacity="0.3"/>
  <text x="85" y="316" fill="#c084fc" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">5</text>
  <text x="115" y="306" fill="#ddd" font-size="13" font-weight="bold" font-family="PingFang SC, sans-serif">验证习惯</text>
  <text x="115" y="324" fill="#888" font-size="11" font-family="PingFang SC, sans-serif">Trust but verify → 输出是草稿不是答案 → 正反馈循环</text>

  <!-- 底部 -->
  <text x="400" y="370" fill="#aaa" text-anchor="middle" font-size="14" font-family="PingFang SC, sans-serif">不是 AI 变强了，是人变强了</text>
  <text x="400" y="390" fill="#666" text-anchor="middle" font-size="11" font-family="PingFang SC, sans-serif">坚持两周，你会发现 AI 的"好用程度"明显提升</text>
</svg>

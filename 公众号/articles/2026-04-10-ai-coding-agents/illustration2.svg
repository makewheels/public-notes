<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0d1117"/>
  <text x="400" y="38" fill="#e0e0e0" text-anchor="middle" font-size="18" font-weight="bold" font-family="PingFang SC, sans-serif">不是选一个，而是组合</text>
  <!-- 四行场景 -->
  <rect x="60" y="65" width="680" height="55" rx="8" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="85" y="90" fill="#888" font-size="13" font-family="PingFang SC, sans-serif">日常编码</text>
  <rect x="280" y="75" width="120" height="30" rx="5" fill="#4a90d9" opacity="0.2"/>
  <text x="340" y="95" fill="#4a90d9" font-size="13" text-anchor="middle" font-family="sans-serif">Cursor</text>
  <text x="540" y="95" fill="#555" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">IDE 内快速编辑 · $20/月</text>

  <rect x="60" y="130" width="680" height="55" rx="8" fill="#101a20" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <text x="85" y="155" fill="#888" font-size="13" font-family="PingFang SC, sans-serif">复杂重构</text>
  <rect x="280" y="140" width="120" height="30" rx="5" fill="#00d4aa" opacity="0.2"/>
  <text x="340" y="160" fill="#00d4aa" font-size="13" text-anchor="middle" font-family="sans-serif">Claude Code</text>
  <text x="540" y="160" fill="#555" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">理解全局架构 · 按 token 计费</text>

  <rect x="60" y="195" width="680" height="55" rx="8" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="85" y="220" fill="#888" font-size="13" font-family="PingFang SC, sans-serif">批量任务</text>
  <rect x="280" y="205" width="120" height="30" rx="5" fill="#ff6b6b" opacity="0.2"/>
  <text x="340" y="225" fill="#ff6b6b" font-size="13" text-anchor="middle" font-family="sans-serif">Devin / Codex</text>
  <text x="540" y="225" fill="#555" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">异步处理 · 100个ticket</text>

  <rect x="60" y="260" width="680" height="55" rx="8" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="85" y="285" fill="#888" font-size="13" font-family="PingFang SC, sans-serif">代码补全</text>
  <rect x="280" y="270" width="120" height="30" rx="5" fill="#ffd93d" opacity="0.2"/>
  <text x="340" y="290" fill="#ffd93d" font-size="13" text-anchor="middle" font-family="sans-serif">Copilot</text>
  <text x="540" y="290" fill="#555" font-size="11" text-anchor="middle" font-family="PingFang SC, sans-serif">随手就用 · $10/月</text>

  <!-- 底部总结 -->
  <text x="400" y="350" fill="#aaa" text-anchor="middle" font-size="14" font-family="PingFang SC, sans-serif">就像木匠不会只用一把锤子</text>
  <text x="400" y="375" fill="#666" text-anchor="middle" font-size="12" font-family="PingFang SC, sans-serif">不同工程任务 → 不同 AI 协作模式</text>
</svg>

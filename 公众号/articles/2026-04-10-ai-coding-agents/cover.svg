<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <!-- 三条竞争线 -->
  <line x1="200" y1="50" x2="200" y2="330" stroke="#ff6b6b" stroke-width="2" opacity="0.3"/>
  <line x1="450" y1="50" x2="450" y2="330" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <line x1="700" y1="50" x2="700" y2="330" stroke="#4a90d9" stroke-width="2" opacity="0.3"/>
  <!-- 三个标签 -->
  <rect x="140" y="60" width="120" height="30" rx="6" fill="#ff6b6b" opacity="0.2"/>
  <text x="200" y="80" fill="#ff6b6b" font-size="14" text-anchor="middle" font-family="sans-serif">Devin</text>
  <rect x="390" y="60" width="120" height="30" rx="6" fill="#00d4aa" opacity="0.2"/>
  <text x="450" y="80" fill="#00d4aa" font-size="14" text-anchor="middle" font-family="sans-serif">Claude Code</text>
  <rect x="640" y="60" width="120" height="30" rx="6" fill="#4a90d9" opacity="0.2"/>
  <text x="700" y="80" fill="#4a90d9" font-size="14" text-anchor="middle" font-family="sans-serif">Codex</text>
  <!-- 主标题 -->
  <text x="450" y="175" fill="#ffffff" font-size="48" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">三个AI码农</text>
  <text x="450" y="235" fill="#e0e0e0" font-size="40" font-weight="bold" text-anchor="middle" font-family="PingFang SC, sans-serif">谁能真正交付</text>
  <!-- 品牌 -->
  <text x="450" y="345" fill="#555" font-size="16" text-anchor="middle" font-family="sans-serif">AIGC Insight</text>
</svg>

<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- 标题第一行 -->
  <text x="450" y="130" font-family="PingFang SC, Arial, sans-serif" font-size="42" 
        font-weight="bold" fill="white" text-anchor="middle">你辛辛苦苦学的技能</text>
  
  <!-- 标题第二行 -->
  <text x="450" y="190" font-family="PingFang SC, Arial, sans-serif" font-size="42" 
        font-weight="bold" fill="white" text-anchor="middle">可能明天就没用了</text>
  
  <!-- 日期 -->
  <text x="450" y="260" font-family="PingFang SC, Arial, sans-serif" font-size="32" 
        fill="#e94560" text-anchor="middle">2026.03.31</text>
  
  <!-- 底部装饰线 -->
  <rect x="300" y="305" width="300" height="3" fill="#e94560" rx="1.5"/>
  
  <!-- 公众号名 -->
  <text x="450" y="350" font-family="PingFang SC, Arial, sans-serif" font-size="16" 
        fill="#8892b0" text-anchor="middle">AI 随想录</text>
</svg>
<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- 标题第一行 -->
  <text x="450" y="130" font-family="PingFang SC, Arial, sans-serif" font-size="48" 
        font-weight="bold" fill="white" text-anchor="middle">AI Agent</text>
  
  <!-- 标题第二行 -->
  <text x="450" y="195" font-family="PingFang SC, Arial, sans-serif" font-size="42" 
        font-weight="bold" fill="white" text-anchor="middle">你的新同事来了</text>
  
  <!-- 日期 -->
  <text x="450" y="265" font-family="PingFang SC, Arial, sans-serif" font-size="32" 
        fill="#00d4ff" text-anchor="middle">2026.04.02</text>
  
  <!-- 底部装饰线 -->
  <rect x="300" y="310" width="300" height="3" fill="#00d4ff" rx="1.5"/>
  
  <!-- 公众号名 -->
  <text x="450" y="355" font-family="PingFang SC, Arial, sans-serif" font-size="16" 
        fill="#8892b0" text-anchor="middle">AI 随想录</text>
</svg>
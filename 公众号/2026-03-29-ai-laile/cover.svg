<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="450" y="170" font-family="PingFang SC, Arial, sans-serif" font-size="72" 
        font-weight="bold" fill="white" text-anchor="middle">开刊词</text>
  
  <!-- 日期 -->
  <text x="450" y="250" font-family="PingFang SC, Arial, sans-serif" font-size="36" 
        fill="#00d4ff" text-anchor="middle">2026.03.30</text>
  
  <!-- 底部装饰线 -->
  <rect x="300" y="300" width="300" height="3" fill="#00d4ff" rx="1.5"/>
  
  <!-- 公众号名 -->
  <text x="450" y="340" font-family="PingFang SC, Arial, sans-serif" font-size="18" 
        fill="#8892b0" text-anchor="middle">AI 随想录</text>
</svg>